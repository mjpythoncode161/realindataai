{% if share %}
{% if share.whatsapp_url or share.mailto_url or share.can_send_email %}
<div class="d-inline-flex flex-wrap align-items-center share-buttons">
  {% if share.whatsapp_url %}
  <a href="{{ share.whatsapp_url }}" class="btn btn-success btn-sm mr-1 mb-1" target="_blank" rel="noopener" title="Send via WhatsApp">
    <i class="fab fa-whatsapp"></i> WhatsApp
  </a>
  {% endif %}
  {% if share.can_send_email %}
  <button type="button"
          class="btn btn-primary btn-sm mr-1 mb-1 btn-send-share-email"
          data-url="{{ send_email_url }}"
          data-email="{{ share.customer_email }}"
          title="Send email to {{ share.customer_email }}">
    <i class="fas fa-envelope"></i> Send Email
  </button>
  {% elif share.mailto_url %}
  <a href="{{ share.mailto_url }}" class="btn btn-primary btn-sm mr-1 mb-1" title="Send via email">
    <i class="fas fa-envelope"></i> Email
  </a>
  {% endif %}
</div>
{% endif %}
{% endif %}
