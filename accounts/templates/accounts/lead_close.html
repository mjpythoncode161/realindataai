{% extends 'base.html' %}

{% block title %}Close Lead{% endblock %}

{% block content %}
<div class="content-header">
  <div class="container-fluid">
    <div class="row mb-2"><div class="col-sm-6"><h1>Close Lead (Lost)</h1></div></div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <p>Close lead for <strong>{{ lead.full_name }}</strong> without converting to customer?</p>
            <form method="POST">
              {% csrf_token %}
              <div class="form-group">
                <label>Reason (optional)</label>
                <textarea name="reason" class="form-control" rows="3" placeholder="Why was this lead closed?"></textarea>
              </div>
              <div class="text-right">
                <a href="{% url 'lead_detail' lead.lead_id %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-danger">Close Lead</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
